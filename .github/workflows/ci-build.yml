# ============================================================================
# CI Build — Build and test the LogSquirl tcpdump plugin on all platforms
# ============================================================================
name: CI Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            qt-arch: linux_gcc_64
            artifact: plugin-linux-x64
            lib-name: liblogsquirl_tcpdump.so
            cmake-flags: ""

          - name: macOS arm64
            os: macos-15
            qt-arch: clang_64
            artifact: plugin-macos-arm64
            lib-name: liblogsquirl_tcpdump.dylib
            cmake-flags: ""

          - name: Windows x64
            os: windows-2025
            qt-arch: win64_msvc2022_64
            artifact: plugin-windows-x64
            lib-name: logsquirl_tcpdump.dll
            cmake-flags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          arch: ${{ matrix.qt-arch }}
          cache: true
          modules: ""

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Configure
        run: >
          cmake -B build -S .
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=ON
          ${{ matrix.cmake-flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Verify exported symbols (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "=== Exported plugin symbols ==="
          nm -gU build/${{ matrix.lib-name }} | grep logsquirl_plugin || true

      - name: Fix macOS rpaths
        if: runner.os == 'macOS'
        run: |
          DYLIB="build/${{ matrix.lib-name }}"
          echo "=== Current rpaths ==="
          otool -l "$DYLIB" | grep -A2 LC_RPATH || true

          for rp in $(otool -l "$DYLIB" | awk '/cmd LC_RPATH/{found=1} found && /path /{print $2; found=0}'); do
            case "$rp" in
              /Users/runner/*|/home/runner/*|/opt/hostedtoolcache/*)
                echo "Removing CI rpath: $rp"
                install_name_tool -delete_rpath "$rp" "$DYLIB" || true
                ;;
            esac
          done

          install_name_tool -add_rpath @loader_path/../../../Frameworks "$DYLIB" 2>/dev/null || true
          install_name_tool -add_rpath @loader_path "$DYLIB" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.lib-name }}
            plugin.json
